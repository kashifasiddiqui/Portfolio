<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0080e6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="50" cy="50" r="45" fill="#050810" stroke="url(#brainGrad)" stroke-width="2"/>
  <g filter="url(#glow)" stroke="url(#brainGrad)" stroke-width="1.5" fill="none">
    <!-- Neural network nodes -->
    <circle cx="50" cy="30" r="4" fill="#00d4ff"/>
    <circle cx="30" cy="50" r="4" fill="#00d4ff"/>
    <circle cx="70" cy="50" r="4" fill="#00d4ff"/>
    <circle cx="40" cy="70" r="4" fill="#00d4ff"/>
    <circle cx="60" cy="70" r="4" fill="#00d4ff"/>
    <circle cx="50" cy="50" r="5" fill="#00d4ff"/>
    <!-- Connections -->
    <line x1="50" y1="30" x2="50" y2="50"/>
    <line x1="30" y1="50" x2="50" y2="50"/>
    <line x1="70" y1="50" x2="50" y2="50"/>
    <line x1="40" y1="70" x2="50" y2="50"/>
    <line x1="60" y1="70" x2="50" y2="50"/>
    <line x1="30" y1="50" x2="40" y2="70"/>
    <line x1="70" y1="50" x2="60" y2="70"/>
  </g>
</svg>
